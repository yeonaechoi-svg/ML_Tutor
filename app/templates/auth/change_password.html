{% extends 'base.html' %}
{% block title %}비밀번호 변경{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-box">
        <h1 class="auth-title">비밀번호 변경</h1>
        <p class="auth-subtitle">초기 비밀번호(1234)를 새 비밀번호로 변경해주세요.<br>4자 이상으로 설정해야 합니다.</p>

        <form method="POST">
            <div class="form-group">
                <label class="form-label" for="new_password">새 비밀번호</label>
                <input class="form-control" type="password" id="new_password" name="new_password"
                       placeholder="새 비밀번호 (4자 이상)" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label class="form-label" for="confirm_password">비밀번호 확인</label>
                <input class="form-control" type="password" id="confirm_password" name="confirm_password"
                       placeholder="비밀번호 재입력" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">변경 완료</button>
        </form>
    </div>
</div>
{% endblock %}
